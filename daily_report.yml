name: 🦠 MalwareBazaar Daily Report

on:
  schedule:
    # Täglich um 06:00 UTC
    - cron: "0 6 * * *"

  # Manuell auslösbar (mit Dry-Run-Option)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-Run (kein API-Call, letztes JSON nutzen)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write   # Notwendig für git commit + push

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # etwas Puffer für VT-Abfragen

    steps:
      # ── 1) Repository auschecken (inkl. History für Delta-Vergleich)
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2) Python-Umgebung einrichten (ohne pip-Cache → kein requirements.txt nötig)
      - name: 🐍 Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # !!! Wichtig: cache: pip wurde entfernt – das löst deinen Fehler !!!

      # ── 3) Abhängigkeiten installieren
      - name: 📦 Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ── 4) Malware-Report generieren
      - name: 🦠 MalwareBazaar Report erstellen
        env:
          MB_API_KEY: ${{ secrets.MB_API_KEY }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run || github.event.inputs.dry_run }}" = "true" ]; then
            echo "→ Dry-Run aktiviert (nutzt letztes JSON)"
            python malware_report.py --dry-run
          else
            python malware_report.py
          fi

      # ── 5) Ausgabedateien sinnvoll sortieren
      - name: 📁 Ausgabedateien organisieren
        run: |
          set -euo pipefail
          mkdir -p reports logs iocs raw web

          # Markdown-Reports verschieben
          mv MalwareBazaar_24h_Report_*.md reports/ 2>/dev/null || true

          # Log verschieben (mit Datum)
          if [ -f malware_report.log ]; then
            mv malware_report.log "logs/malware_report_$(date -u +%Y-%m-%d).log" || true
          fi

          # IOCs
          mv iocs_*.txt iocs/ 2>/dev/null || true

          # Raw JSON von MalwareBazaar
          mv MalwareBazaar_raw_*.json raw/ 2>/dev/null || true

          echo "=== Dateien nach Organisation ==="
          ls -la reports/ logs/ iocs/ raw/ 2>/dev/null || true

      # ── 6) latest.md erstellen (kopieren statt symlink – Pages mag Symlinks nicht immer)
      - name: 🔗 Neuesten Report als latest.md bereitstellen
        run: |
          LATEST=$(ls -t reports/MalwareBazaar_24h_Report_*.md 2>/dev/null | head -n 1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" reports/latest.md
            echo "Latest Report: $LATEST → reports/latest.md"
          else
            echo "⚠️ Kein Report gefunden – latest.md nicht erstellt"
          fi

      # ── 7) RSS-Feed generieren
      - name: 📡 RSS-Feed erstellen
        run: python scripts/generate_rss.py

      # ── 8) Web-Dashboard generieren
      - name: 🌐 Web-Dashboard aktualisieren
        run: python scripts/generate_web.py

      # ── 9) Änderungen committen & pushen (nur wenn etwas geändert wurde)
      - name: 📤 Commit & Push (falls Änderungen vorhanden)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports/ logs/ iocs/ raw/ web/ rss.xml malware_history.json || true

          if git diff --staged --quiet; then
            echo "Keine Änderungen → kein Commit nötig"
          else
            git commit -m "🦠 Daily Malware Report Update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Änderungen erfolgreich gepusht"
          fi

      # ── 10) Wichtige Artefakte für Debugging / Download sichern
      - name: 📎 Wichtige Dateien als Artifact hochladen
        if: always()   # auch bei Fehlern Artefakte behalten
        uses: actions/upload-artifact@v4
        with:
          name: malware-report-${{ github.run_number }}
          path: |
            reports/latest.md
            reports/*.md
            logs/
            iocs/
            raw/*.json
          retention-days: 14
